services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: voiceplat
      POSTGRES_PASSWORD: voiceplat
      POSTGRES_DB: voiceplat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voiceplat"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.11.3
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  gateway:
    build: ./gateway
    env_file:
      - ./gateway/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://voiceplat:voiceplat@postgres:5432/voiceplat
      REDIS_URL: redis://redis:6379/0
      QDRANT_LOCATION: http://qdrant:6333
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

volumes:
  postgres_data:
  qdrant_data:
